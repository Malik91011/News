<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Real-Time News Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { 
        --bg: #050505; 
        --card-bg: rgba(255, 255, 255, 0.03); 
        --border: rgba(255, 255, 255, 0.1); 
        --accent: #e8c547; 
        --text: #f0f0f0; 
        --muted: #888; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; }

    header { 
        border-bottom: 1px solid var(--border); 
        padding: 0 2.5rem; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        height: 85px; 
        position: sticky; 
        top: 0; 
        background: rgba(5, 5, 5, 0.85); 
        backdrop-filter: blur(20px); 
        z-index: 1000; 
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: -1.5px; }

    .search-container { 
        display: flex; 
        align-items: center; 
        background: rgba(255,255,255,0.05); 
        border: 1px solid var(--border); 
        border-radius: 50px; 
        padding: 5px 6px 5px 22px; 
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
    }
    .search-container:focus-within { 
        border-color: var(--accent); 
        background: rgba(255,255,255,0.08);
        box-shadow: 0 0 20px rgba(232, 197, 71, 0.15);
    }
    .search-container input { 
        background: transparent; border: none; color: #fff; font-size: 0.9rem; outline: none; width: 240px; font-weight: 300;
    }
    .search-container button { 
        background: var(--accent); border: none; color: #000; font-weight: 700; font-size: 0.75rem; padding: 10px 24px; cursor: pointer; border-radius: 50px; text-transform: uppercase; transition: all 0.3s ease;
    }
    .search-container button:hover { transform: scale(1.05); background: #fff; }

    /* --- TIME STRIP --- */
    .time-strip {
        background: #000;
        border-bottom: 1px solid var(--border);
        padding: 10px 2.5rem;
        display: flex;
        gap: 2.5rem;
        overflow-x: auto;
        white-space: nowrap;
        scrollbar-width: none;
    }
    .time-strip::-webkit-scrollbar { display: none; }
    .time-item { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .time-item span { color: var(--accent); margin-left: 8px; font-weight: 600; }

    .categories { display: flex; padding: 0 2.5rem; border-bottom: 1px solid var(--border); overflow-x: auto; gap: 1.5rem; scrollbar-width: none; background: var(--bg); }
    .cat-btn { background: none; border: none; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; padding: 1.5rem 0.5rem; cursor: pointer; text-transform: uppercase; border-bottom: 2px solid transparent; transition: 0.3s ease; letter-spacing: 1px; }
    .cat-btn:hover { color: #fff; }
    .cat-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .briefing-strip { background: #0a0a0a; border-bottom: 1px solid var(--border); padding: 0.9rem 2.5rem; font-size: 0.85rem; display: flex; align-items: center; }
    .briefing-label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.65rem; margin-right: 1.2rem; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 2px; letter-spacing: 1px; }

    main { padding: 3rem 2.5rem; max-width: 1600px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem; }
    
    .card { 
        background: var(--card-bg); border: 1px solid var(--border); padding: 2.5rem; text-decoration: none; color: inherit; transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); border-radius: 12px; display: flex; flex-direction: column; height: 100%; position: relative; overflow: hidden;
    }
    .card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(232, 197, 71, 0.4); transform: translateY(-12px) scale(1.02); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.2rem; color: #fff; line-height: 1.2; }
    .card-summary { font-size: 0.95rem; color: #aaa; line-height: 1.8; margin-bottom: 2.5rem; font-weight: 300; }
    .card-meta { margin-top: auto; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #666; display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 1.5rem; align-items: center; }
    
    .pulse { height: 8px; width: 8px; background: #ff4d4d; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px #ff4d4d; animation: pulse-anim 2s infinite; }
    @keyframes pulse-anim { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* --- SHARE SYSTEM --- */
    .share-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; transition: 0.3s; padding: 0; letter-spacing: 1px; }
    .share-btn:hover { color: var(--accent); }

    .share-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; }
    .share-menu { background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 340px; text-align: center; }
    .share-menu h4 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 1.5rem; margin-bottom: 2rem; letter-spacing: -1px; }
    .share-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .share-opt { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 15px; font-size: 0.65rem; font-family: 'IBM Plex Mono', monospace; text-decoration: none; cursor: pointer; transition: 0.3s; }
    .share-opt:hover { background: var(--accent); color: #000; }
    .close-share { margin-top: 2rem; display: block; color: var(--muted); font-size: 0.65rem; font-family: 'IBM Plex Mono', monospace; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="logo">PULSE<span>.</span></div>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search keywords..." onkeypress="if(event.key==='Enter') searchNews()">
    <button onclick="searchNews()" id="searchBtn">Search</button>
  </div>
</header>

<div class="time-strip" id="timeStrip"></div>

<nav class="categories" id="catNav"></nav>

<div class="briefing-strip">
  <span class="briefing-label">Status</span>
  <span id="briefingText" style="color: #666;">Synchronizing local and global bureaus...</span>
</div>

<main>
  <div class="grid" id="newsGrid"></div>
</main>

<div class="share-overlay" id="shareOverlay">
    <div class="share-menu">
        <h4>DISTRIBUTE</h4>
        <div class="share-options">
            <a id="shareX" class="share-opt" target="_blank">X.COM</a>
            <a id="shareFB" class="share-opt" target="_blank">FACEBOOK</a>
            <a id="shareLI" class="share-opt" target="_blank">LINKEDIN</a>
            <div onclick="copyToClipboard()" class="share-opt">COPY LINK</div>
        </div>
        <span class="close-share" onclick="closeShare()">DISMISS</span>
    </div>
</div>

<script>
  const CATEGORIES = {{ categories | tojson }};
  let activeCategory = "Pakistan";
  let currentShareUrl = "";

  function updateWorldClock() {
    const zones = [
        { label: 'Islamabad', zone: 'Asia/Karachi' },
        { label: 'London', zone: 'Europe/London' },
        { label: 'New York', zone: 'America/New_York' },
        { label: 'Tokyo', zone: 'Asia/Tokyo' },
        { label: 'Dubai', zone: 'Asia/Dubai' }
    ];
    const now = new Date();
    document.getElementById('timeStrip').innerHTML = zones.map(z => {
        const timeStr = now.toLocaleTimeString('en-GB', { timeZone: z.zone, hour: '2-digit', minute: '2-digit', hour12: false });
        return `<div class="time-item">${z.label}<span>${timeStr}</span></div>`;
    }).join('');
  }

  function openShare(url, title) {
    currentShareUrl = url;
    const encodedUrl = encodeURIComponent(url);
    const encodedText = encodeURIComponent(title);
    document.getElementById('shareX').href = `https://x.com/intent/tweet?text=${encodedText}&url=${encodedUrl}`;
    document.getElementById('shareFB').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
    document.getElementById('shareLI').href = `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`;
    document.getElementById('shareOverlay').style.display = 'flex';
  }

  function closeShare() { document.getElementById('shareOverlay').style.display = 'none'; }

  function copyToClipboard() {
    navigator.clipboard.writeText(currentShareUrl);
    alert("LINK COPIED TO CLIPBOARD");
    closeShare();
  }

  function init() {
    updateWorldClock();
    setInterval(updateWorldClock, 60000);
    const nav = document.getElementById('catNav');
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = `cat-btn ${cat === activeCategory ? 'active' : ''}`;
      btn.innerText = cat;
      btn.onclick = () => switchCategory(cat);
      nav.appendChild(btn);
    });
    loadContent();
  }

  function switchCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === cat));
    document.getElementById('searchInput').value = ""; 
    loadContent();
  }

  async function loadContent(query = "") {
    const grid = document.getElementById('newsGrid');
    const briefing = document.getElementById('briefingText');
    const searchBtn = document.getElementById('searchBtn');
    grid.style.opacity = "0.4";
    if(query) searchBtn.innerText = "WAIT...";
    try {
        const queryParam = query ? `&q=${encodeURIComponent(query)}` : "";
        const nRes = await fetch(`/api/news?category=${activeCategory}${queryParam}`);
        const nData = await nRes.json();
        if (nData.articles.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #555; padding-top: 5rem; font-family: 'IBM Plex Mono';">NO RESULTS MATCHING "${query}"</div>`;
        } else {
            grid.innerHTML = nData.articles.map(a => `
              <a href="${a.url}" class="card" target="_blank" onclick="if(event.target.tagName==='BUTTON') return false;">
                <div class="card-title">${a.title}</div>
                <div class="card-summary">${a.summary}</div>
                <div class="card-meta">
                    <span>${a.source}</span>
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <button class="share-btn" onclick="event.preventDefault(); event.stopPropagation(); openShare('${a.url}', '${a.title.replace(/'/g, "\\'")}')">SHARE</button>
                        <span><span class="pulse"></span> LIVE</span>
                    </div>
                </div>
              </a>
            `).join('');
        }
        grid.style.opacity = "1";
        searchBtn.innerText = "Search";
        if (!query) {
            const sRes = await fetch(`/api/summary?category=${activeCategory}`);
            const sData = await sRes.json();
            briefing.innerText = sData.summary;
        }
    } catch (err) { console.error(err); grid.style.opacity = "1"; searchBtn.innerText = "Search"; }
  }

  function searchNews() { loadContent(document.getElementById('searchInput').value); }
  window.onclick = function(e) { if (e.target == document.getElementById('shareOverlay')) closeShare(); }
  window.onload = init;
</script>
</body>
</html>
