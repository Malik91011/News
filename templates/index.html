<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PULSE — AI News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8c547;
      --accent2: #c0392b;
      --text: #e8e8e8;
      --muted: #888;
      --card: #141414;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .header-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* SEARCH */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--accent); }

    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      padding: 0.45rem 0.8rem;
      width: 220px;
    }

    .search-bar button {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .search-bar button:hover { background: #f0d060; }

    /* CATEGORIES */
    .categories {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .cat-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cat-btn:hover { color: var(--text); }
    .cat-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* BRIEFING STRIP */
    .briefing-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .briefing-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      padding-top: 2px;
    }

    .briefing-text {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* GRID */
    main { padding: 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--card);
      padding: 1.6rem;
      transition: background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      text-decoration: none;
      color: inherit;
    }

    .card:hover { background: #1a1a1a; }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-category {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    .card-summary {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.65;
    }

      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem
