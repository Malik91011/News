<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Real-Time News</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0a; --surface: #111; --border: #222; --accent: #e8c547; --text: #e8e8e8; --muted: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; }
    header { border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--accent); }
    .categories { display: flex; padding: 0 2rem; border-bottom: 1px solid var(--border); overflow-x: auto; gap: 1rem; scrollbar-width: none; }
    .cat-btn { background: none; border: none; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; padding: 1rem 0.5rem; cursor: pointer; text-transform: uppercase; border-bottom: 2px solid transparent; white-space: nowrap; }
    .cat-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .briefing-strip { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; font-size: 0.85rem; color: var(--muted); display: flex; gap: 1rem; align-items: center; }
    .briefing-label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; flex-shrink: 0; }
    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .card { background: #141414; border: 1px solid var(--border); padding: 1.8rem; text-decoration: none; color: inherit; transition: all 0.3s ease; display: flex; flex-direction: column; height: 100%; }
    .card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 1rem; color: #fff; }
    .card-summary { font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    .card-meta { margin-top: auto; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: #666; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem; }
    .live-dot { height: 6px; width: 6px; background-color: #ff4d4d; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  </style>
</head>
<body>

<header><div class="logo">PULSE<span>.</span></div></header>
<nav class="categories" id="catNav"></nav>
<div class="briefing-strip"><span class="briefing-label">Live Analysis</span><span id="briefingText">Syncing...</span></div>
<main><div class="grid" id="newsGrid"></div></main>

<script>
  const CATEGORIES = {{ categories | tojson }};
  let activeCategory = "World";

  function init() {
    const nav = document.getElementById('catNav');
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = `cat-btn ${cat === activeCategory ? 'active' : ''}`;
      btn.innerText = cat;
      btn.onclick = () => switchCategory(cat);
      nav.appendChild(btn);
    });
    loadContent();
  }

  function switchCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === cat));
    loadContent();
  }

  async function loadContent() {
    const grid = document.getElementById('newsGrid');
    const briefing = document.getElementById('briefingText');
    grid.innerHTML = "<div style='color: #444; font-family: monospace;'>FETCHING LIVE DATA...</div>";
    
    try {
        // Step 1: Fetch News
        const nRes = await fetch(`/api/news?category=${activeCategory}`);
        const nData = await nRes.json();
        
        if (nData.articles && nData.articles.length > 0) {
            grid.innerHTML = nData.articles.map(a => `
              <a href="${a.url}" class="card" target="_blank">
                <div class="card-title">${a.title}</div>
                <div class="card-summary">${a.summary}</div>
                <div class="card-meta"><span>BBC NEWS</span><span><span class="live-dot"></span> ${a.time || 'Recently'}</span></div>
              </a>
            `).join('');
        } else {
            grid.innerHTML = "<div style='color: #888;'>AI is syncing. Refresh in 10 seconds...</div>";
        }

        // Step 2: WAIT 2 seconds to avoid Rate Limit (429)
        await new Promise(r => setTimeout(r, 2000));

        // Step 3: Fetch Summary
        const sRes = await fetch(`/api/summary?category=${activeCategory}`);
        const sData = await sRes.json();
        briefing.innerText = sData.summary;

    } catch (err) {
        grid.innerHTML = "Connectivity unstable. Please wait.";
    }
  }

  window.onload = init;
</script>
</body>
</html>
