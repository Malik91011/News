<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PULSE — AI News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8c547;
      --accent2: #c0392b;
      --text: #e8e8e8;
      --muted: #888;
      --card: #141414;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .header-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* SEARCH */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--accent); }

    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      padding: 0.45rem 0.8rem;
      width: 220px;
    }

    .search-bar button {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .search-bar button:hover { background: #f0d060; }

    /* CATEGORIES */
    .categories {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .cat-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cat-btn:hover { color: var(--text); }
    .cat-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* BRIEFING STRIP */
    .briefing-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .briefing-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      padding-top: 2px;
    }

    .briefing-text {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* GRID */
    main { padding: 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--card);
      padding: 1.6rem;
      transition: background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      text-decoration: none;
      color: inherit;
    }

    .card:hover { background: #1a1a1a; }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-category {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    .card-summary {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.65;
    }

    .card-source {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: #555;
      border-top: 1px solid var(--border);
      padding-top: 0.7rem;
      margin-top: auto;
    }

    /* STATES */
    .loading-state, .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.8rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
    }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<header>
  <div class="logo">PULSE<span>.</span></div>
  <div class="header-tag">AI-Powered News</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="search anything..." onkeydown="if(event.key==='Enter') searchNews()">
    <button onclick="searchNews()">SEARCH</button>
  </div>
</header>

<nav class="categories" id="categories"></nav>

<div class="briefing-strip">
  <span class="briefing-label">Briefing</span>
  <span class="briefing-text" id="briefingText">Loading today's briefing…</span>
</div>

<main>
  <div class="grid" id="grid">
    <div class="loading-state"><span class="spinner"></span>Fetching news…</div>
  </div>
</main>

<script>
  // FIX 1: Add default fallback to prevent 'Undefined' crash
  const CATEGORIES = {{ categories | default([]) | tojson }};
  
  // FIX 2: Dynamic initial active category selection
  let activeCategory = CATEGORIES.length > 0 ? CATEGORIES[0] : "World";

  // Build category tabs
  const nav = document.getElementById("categories");
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === activeCategory ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => selectCategory(cat);
    nav.appendChild(btn);
  });

  function selectCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll(".cat-btn").forEach(b => {
      b.classList.toggle("active", b.textContent === cat);
    });
    document.getElementById("searchInput").value = "";
    loadNews(cat);
    loadBriefing(cat);
  }

  async function loadNews(category, query = "") {
    const grid = document.getElementById("grid");
    grid.innerHTML = `<div class="loading-state"><span class="spinner"></span>Fetching ${category} news…</div>`;
    try {
      const params = new URLSearchParams({ category, q: query });
      const res = await fetch(`/api/news?${params}`);
      const data = await res.json();
      if (data.success && data.articles && data.articles.length) {
        renderCards(data.articles);
      } else {
        grid.innerHTML = `<div class="empty-state">No articles found. Try a different search.</div>`;
      }
    } catch (e) {
      grid.innerHTML = `<div class="empty-state">Error loading news: ${e.message}</div>`;
    }
  }

  function renderCards(articles) {
    const grid = document.getElementById("grid");
    grid.innerHTML = articles.map((a, i) => `
      <a class="card fade-in" href="${a.url || '#'}" target="_blank" rel="noopener" style="animation-delay:${i * 60}ms">
        <div class="card-meta">
          <span class="card-category">${a.category || activeCategory}</span>
          <span class="card-time">${a.time || 'Recently'}</span>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-summary">${a.summary}</div>
        <div class="card-source">↗ ${a.source || 'Unknown source'}</div>
      </a>
    `).join("");
  }

  // FIX 3: Ensure this matches the endpoint in your index.py
  async function loadBriefing(category) {
    const el = document.getElementById("briefingText");
    el.textContent = "Generating briefing…";
    try {
      const res = await fetch(`/api/summary?category=${category}`);
      const data = await res.json();
      el.textContent = data.success ? data.summary : "Could not load briefing.";
    } catch (e) {
      el.textContent = "Briefing unavailable.";
    }
  }

  function searchNews() {
    const q = document.getElementById("searchInput").value.trim();
    if (q) loadNews(activeCategory, q);
  }

  // Initial load
  window.onload = () => {
    loadNews(activeCategory);
    loadBriefing(activeCategory);
  };
</script>
</body>
</html>
