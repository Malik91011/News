<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — News Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #050505; --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); --accent: #e8c547; --text: #f0f0f0; --muted: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; overflow-x: hidden; }

    header { border-bottom: 1px solid var(--border); padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between; height: 85px; position: sticky; top: 0; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); z-index: 1000; }
    .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: -1.5px; }

    .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50px; padding: 5px 6px 5px 22px; }
    .search-container input { background: transparent; border: none; color: #fff; font-size: 0.9rem; outline: none; width: 200px; }
    .search-container button { background: var(--accent); border: none; color: #000; font-weight: 700; font-size: 0.75rem; padding: 8px 20px; cursor: pointer; border-radius: 50px; text-transform: uppercase; }

    .time-strip { background: #000; border-bottom: 1px solid var(--border); padding: 10px 2.5rem; display: flex; gap: 2.5rem; overflow-x: auto; scrollbar-width: none; }
    .time-item { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
    .time-item span { color: var(--accent); margin-left: 8px; }

    .categories { display: flex; padding: 0 2.5rem; border-bottom: 1px solid var(--border); gap: 1.5rem; background: var(--bg); overflow-x: auto; }
    .cat-btn { background: none; border: none; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; padding: 1.5rem 0.5rem; cursor: pointer; text-transform: uppercase; border-bottom: 2px solid transparent; white-space: nowrap; transition: 0.3s; }
    .cat-btn:hover, .cat-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .briefing-strip { background: #0a0a0a; border-bottom: 1px solid var(--border); padding: 0.9rem 2.5rem; font-size: 0.85rem; }
    .briefing-label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.65rem; margin-right: 1.2rem; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 2px; }

    main { padding: 3rem 2.5rem; max-width: 1600px; margin: 0 auto; min-height: 100vh; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
    
    .card { background: var(--card-bg); border: 1px solid var(--border); padding: 2.5rem; border-radius: 12px; display: flex; flex-direction: column; transition: 0.4s; }
    .card:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); transform: translateY(-5px); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #fff; margin-bottom: 1rem; line-height: 1.3; }
    .card-summary { font-size: 0.9rem; color: #aaa; line-height: 1.7; margin-bottom: 2rem; font-weight: 300; }
    .card-meta { margin-top: auto; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #666; display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 1rem; }

    /* Map Overlay */
    .map-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 3000; padding: 2rem; flex-direction: column; }
    .map-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #080808; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
    #svgTarget svg { width: 90%; height: 90%; }
    .map-tooltip { position: fixed; background: #000; border: 1px solid var(--accent); padding: 10px; color: #fff; font-family: 'IBM Plex Mono'; font-size: 0.7rem; pointer-events: none; display: none; z-index: 3001; }
  </style>
</head>

    <button onclick="searchNews()">Search</button>

        <button class="cat-btn" onclick="closeMap()">[ ESC ] DISCONNECT</button>
    </div>
    <div class="map-container">
        <div id="mapTooltip" class="map-tooltip"></div>
        <div id="svgTarget" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">

<body>

<header>
  <div class="logo">PULSE<span>.</span></div>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search...">
    <button onclick="searchNews()">Search</button>
  </div>
</header>

<div class="time-strip" id="timeStrip"></div>
<nav class="categories" id="catNav"></nav>
<div class="briefing-strip"><span class="briefing-label">Status</span><span id="briefingText">Initializing Data Stream...</span></div>

<main><div class="grid" id="newsGrid"></div></main>

<div class="map-overlay" id="mapOverlay">
    <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
        <div class="logo" style="font-size:1.2rem">PULSE. GLOBAL RISK</div>
        <button class="cat-btn" onclick="closeMap()">[ ESC ] DISCONNECT</button>
    </div>
    <div class="map-container">
        <div id="mapTooltip" class="map-tooltip"></div>
        <div id="svgTarget" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
            <p style="color:var(--accent); font-family:'IBM Plex Mono'">WAITING FOR SVG DATA...</p>
        </div>
    </div>
</div>

<script>
  // Safety check for categories
  const CATEGORIES = {{ categories | tojson if categories else '["Pakistan", "World", "Business"]' }};
  let activeCategory = CATEGORIES[0];

  function updateClock() {
    const zones = [{l:'ISLAMABAD',z:'Asia/Karachi'},{l:'LONDON',z:'Europe/London'},{l:'NEW YORK',z:'America/New_York'}];
    document.getElementById('timeStrip').innerHTML = zones.map(z => `<div class="time-item">${z.l}<span>${new Date().toLocaleTimeString('en-GB',{timeZone:z.z,hour:'2-digit',minute:'2-digit'})}</span></div>`).join('');
  }

  async function loadContent(q = "") {
    const grid = document.getElementById('newsGrid');
    const briefing = document.getElementById('briefingText');
    briefing.innerText = `Fetching ${activeCategory} data...`;
    
    try {
        const res = await fetch(`/api/news?category=${activeCategory}${q ? '&q='+q : ''}`);
        const data = await res.json();
        
        if (!data.articles || data.articles.length === 0) {
            grid.innerHTML = `<p style="color:var(--muted)">No data found for this sector.</p>`;
            return;
        }

        grid.innerHTML = data.articles.map(a => `
            <div class="card">
                <div class="card-title">${a.title}</div>
                <div class="card-summary">${a.summary}</div>
                <div class="card-meta">
                    <span>${a.source}</span>
                    <span style="color:var(--accent)">LIVE FEED</span>
                </div>
            </div>`).join('');
        briefing.innerText = `Intelligence feed synchronized: ${activeCategory}`;
    } catch (e) {
        briefing.innerText = "Connection Error.";
        console.error(e);
    }
  }

  function switchCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === cat));
    loadContent();
  }

  function searchNews() {
    const q = document.getElementById('searchInput').value;
    loadContent(q);
  }

  async function openGlobalMap() {
    document.getElementById('mapOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    const svg = document.querySelector('#svgTarget svg');
    const tooltip = document.getElementById('mapTooltip');
    
    if(!svg) return;

    const res = await fetch('/api/news?category=World');
    const data = await res.json();

    svg.querySelectorAll('path').forEach(path => {
        const name = path.getAttribute('name') || path.getAttribute('id') || "";
        let risk = "LOW";
        let color = "#1a1a1a";

        data.articles.forEach(art => {
            const text = (art.title + art.summary).toLowerCase();
            if (name && text.includes(name.toLowerCase())) {
                if (text.match(/war|death|dead|attack|critical/)) { risk = "CRITICAL"; color = "#ff4d4d"; }
                else if (text.match(/protest|strike|alert/)) { risk = "HIGH"; color = "#ffa500"; }
            }
        });

        path.style.fill = color;
        path.style.stroke = "#333";
        path.onmouseenter = (e) => {
            path.style.filter = "brightness(2)";
            tooltip.style.display = 'block';
            tooltip.innerHTML = `SECTOR: ${name.toUpperCase()}<br>RISK: ${risk}`;
        };
        path.onmousemove = (e) => { tooltip.style.left = (e.clientX+15)+'px'; tooltip.style.top = (e.clientY+15)+'px'; };
        path.onmouseleave = () => { path.style.filter = ""; tooltip.style.display = 'none'; };
    });
  }

  function closeMap() { document.getElementById('mapOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

  window.onload = () => {
    updateClock();
    setInterval(updateClock, 60000);
    const nav = document.getElementById('catNav');
    CATEGORIES.forEach(cat => {
        const b = document.createElement('button');
        b.className = `cat-btn ${cat === activeCategory ? 'active' : ''}`;
        b.innerText = cat;
        b.onclick = () => switchCategory(cat);
        nav.appendChild(b);
    });
    const mapB = document.createElement('button');
    mapB.className = 'cat-btn';
    mapB.style.color = 'var(--accent)';
    mapB.innerHTML = 'GLOBAL MAP';
    mapB.onclick = openGlobalMap;
    nav.appendChild(mapB);
    loadContent();
  };
</script>
</body>
