<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Real-Time News Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root { 
        --bg: #050505; 
        --card-bg: rgba(255, 255, 255, 0.03); 
        --border: rgba(255, 255, 255, 0.1); 
        --accent: #e8c547; 
        --text: #f0f0f0; 
        --muted: #888; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; overflow-x: hidden; }

    header { 
        border-bottom: 1px solid var(--border); padding: 0 2.5rem; display: flex; 
        align-items: center; justify-content: space-between; height: 85px; 
        position: sticky; top: 0; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); z-index: 1000; 
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: -1.5px; }

    .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50px; padding: 5px 6px 5px 22px; }
    .search-container input { background: transparent; border: none; color: #fff; font-size: 0.9rem; outline: none; width: 240px; }
    .search-container button { background: var(--accent); border: none; color: #000; font-weight: 700; font-size: 0.75rem; padding: 10px 24px; cursor: pointer; border-radius: 50px; text-transform: uppercase; }

    .time-strip { background: #000; border-bottom: 1px solid var(--border); padding: 10px 2.5rem; display: flex; gap: 2.5rem; overflow-x: auto; scrollbar-width: none; }
    .time-item { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .time-item span { color: var(--accent); margin-left: 8px; font-weight: 600; }

    .categories { display: flex; padding: 0 2.5rem; border-bottom: 1px solid var(--border); overflow-x: auto; gap: 1.5rem; scrollbar-width: none; }
    .cat-btn { background: none; border: none; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; padding: 1.5rem 0.5rem; cursor: pointer; text-transform: uppercase; border-bottom: 2px solid transparent; transition: 0.3s ease; }
    .cat-btn:hover, .cat-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .briefing-strip { background: #0a0a0a; border-bottom: 1px solid var(--border); padding: 0.9rem 2.5rem; font-size: 0.85rem; display: flex; align-items: center; }
    .briefing-label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.65rem; margin-right: 1.2rem; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 2px; }

    main { padding: 3rem 2.5rem; max-width: 1600px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem; }
    
    .card { background: var(--card-bg); border: 1px solid var(--border); padding: 2.5rem; border-radius: 12px; display: flex; flex-direction: column; height: 100%; transition: transform 0.4s ease; }
    .card:hover { transform: translateY(-10px); border-color: var(--accent); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.2rem; color: #fff; }
    .card-summary { font-size: 0.95rem; color: #aaa; line-height: 1.8; margin-bottom: 2.5rem; }

    /* --- MAP MODAL & DARK FILTER --- */
    .map-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px); z-index: 3000; padding: 2rem; flex-direction: column; }
    .map-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .map-container { flex-grow: 1; border: 1px solid var(--border); position: relative; background: #000; overflow: hidden; }
    
    /* Dark Theme for Leaflet Tiles */
    .leaflet-tile-container { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    .leaflet-container { background: #000 !important; }

    .risk-legend { position: absolute; bottom: 30px; left: 30px; background: rgba(10, 10, 10, 0.95); border: 1px solid var(--accent); padding: 1.5rem; font-family: 'IBM Plex Mono', monospace; z-index: 3005; pointer-events: none; }
    .legend-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 0.7rem; }
    .legend-box { width: 12px; height: 12px; border-radius: 2px; }

    #mapTooltip { display:none; position: fixed; background: #e8c547; color: #000; padding: 10px; font-family: 'IBM Plex Mono'; font-size: 0.7rem; z-index: 5000; pointer-events: none; border: 1px solid #000; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <div class="logo">PULSE<span>.</span></div>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search keywords..." onkeypress="if(event.key==='Enter') searchNews()">
    <button onclick="searchNews()">Search</button>
  </div>
</header>

<div class="time-strip" id="timeStrip"></div>
<nav class="categories" id="catNav"></nav>

<div class="briefing-strip">
  <span class="briefing-label">Status</span>
  <span id="briefingText" style="color: #666;">Intelligence feed synchronized...</span>
</div>

<main><div class="grid" id="newsGrid"></div></main>

<div class="map-overlay" id="mapOverlay">
    <div class="map-header">
        <div class="logo">PULSE<span>.</span> RISK MAP</div>
        <button class="cat-btn" onclick="closeMap()" style="color: #fff;">[ ESC ] CLOSE</button>
    </div>
    <div class="map-container">
        <div id="leafletMap" style="width: 100%; height: 100%;"></div>
        <div id="mapTooltip"></div>
        <div class="risk-legend">
            <h4 style="color: var(--accent); font-size: 0.8rem; margin-bottom: 15px; text-transform: uppercase;">Intelligence Legend</h4>
            <div class="legend-item"><div class="legend-box" style="background: #ff4d4d;"></div><span>CRITICAL</span></div>
            <div class="legend-item"><div class="legend-box" style="background: #e8c547;"></div><span>HIGH RISK</span></div>
            <div class="legend-item"><div class="legend-box" style="background: #4dff88;"></div><span>STABLE</span></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const CATEGORIES = {{ categories | tojson }};
  let activeCategory = "Pakistan";
  let map;
  let riskDatabase = {};

  async function initFreeMap() {
    // 1. Fetch Intelligence Data
    const res = await fetch('/api/risk-data');
    riskDatabase = await res.json();

    // 2. Setup Map
    map = L.map('leafletMap', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);

    // 3. Add Tiles (Standard OSM with CSS Filter in Styles)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 4. Load Country Borders (GeoJSON)
    const geoResponse = await fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson');
    const geoData = await geoResponse.json();

    const tooltip = document.getElementById('mapTooltip');

    L.geoJson(geoData, {
        style: function(feature) {
            const code = feature.properties.ISO_A2;
            const risk = riskDatabase[code];
            return {
                fillColor: risk ? risk.color : '#222',
                fillOpacity: risk ? 0.6 : 0.05,
                color: 'rgba(255,255,255,0.1)',
                weight: 1
            };
        },
        onEachFeature: function(feature, layer) {
            layer.on({
                mouseover: function(e) {
                    const code = feature.properties.ISO_A2;
                    const risk = riskDatabase[code];
                    if(risk) {
                        tooltip.style.display = 'block';
                        tooltip.innerHTML = `REGION: ${feature.properties.ADMIN}<br>STATUS: ${risk.level}<br>${risk.info}`;
                        tooltip.style.background = risk.color;
                        layer.setStyle({ fillOpacity: 0.8 });
                    }
                },
                mousemove: function(e) {
                    tooltip.style.left = (e.originalEvent.clientX + 15) + 'px';
                    tooltip.style.top = (e.originalEvent.clientY + 15) + 'px';
                },
                mouseout: function(e) {
                    tooltip.style.display = 'none';
                    const code = feature.properties.ISO_A2;
                    layer.setStyle({ fillOpacity: riskDatabase[code] ? 0.6 : 0.05 });
                }
            });
        }
    }).addTo(map);
  }

  function updateWorldClock() {
    const zones = [
        { label: 'Islamabad', zone: 'Asia/Karachi' }, { label: 'London', zone: 'Europe/London' },
        { label: 'New York', zone: 'America/New_York' }, { label: 'Tokyo', zone: 'Asia/Tokyo' }
    ];
    const now = new Date();
    document.getElementById('timeStrip').innerHTML = zones.map(z => {
        const timeStr = now.toLocaleTimeString('en-GB', { timeZone: z.zone, hour: '2-digit', minute: '2-digit', hour12: false });
        return `<div class="time-item">${z.label}<span>${timeStr}</span></div>`;
    }).join('');
  }

  function init() {
    updateWorldClock();
    setInterval(updateWorldClock, 60000);
    const nav = document.getElementById('catNav');
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = `cat-btn ${cat === activeCategory ? 'active' : ''}`;
      btn.innerText = cat;
      btn.onclick = () => switchCategory(cat);
      nav.appendChild(btn);
    });
    const mapBtn = document.createElement('button');
    mapBtn.className = 'cat-btn'; mapBtn.style.color = 'var(--accent)';
    mapBtn.innerHTML = 'GLOBAL RISK MAP'; mapBtn.onclick = () => {
        document.getElementById('mapOverlay').style.display = 'flex';
        setTimeout(() => map.invalidateSize(), 200); // Ensures Leaflet renders correctly in modal
    };
    nav.appendChild(mapBtn);
    loadContent();
    initFreeMap();
  }

  function closeMap() { document.getElementById('mapOverlay').style.display = 'none'; }

  async function loadContent(query = "") {
    const grid = document.getElementById('newsGrid');
    grid.style.opacity = "0.3";
    try {
        const res = await fetch(`/api/news?category=${activeCategory}${query ? '&q='+query : ''}`);
        const data = await res.json();
        grid.innerHTML = data.articles.map(a => `
            <div class="card">
                <a href="${a.url}" target="_blank" style="text-decoration:none; color:inherit;">
                    <div class="card-title">${a.title}</div>
                    <div class="card-summary">${a.summary}</div>
                </a>
                <div class="card-meta"><span>${a.source}</span><span><span class="pulse"></span> LIVE</span></div>
            </div>
        `).join('');
        grid.style.opacity = "1";
    } catch (e) {}
  }

  function switchCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === cat));
    loadContent();
  }

  function searchNews() { loadContent(document.getElementById('searchInput').value); }
  window.onload = init;
</script>
</body>
</html>
