<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Real-Time News Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    :root { 
        --bg: #050505; 
        --card-bg: rgba(255, 255, 255, 0.03); 
        --border: rgba(255, 255, 255, 0.1); 
        --accent: #e8c547; 
        --text: #f0f0f0; 
        --muted: #888; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    header { 
        border-bottom: 1px solid var(--border); padding: 0 2.5rem; display: flex; 
        align-items: center; justify-content: space-between; height: 85px; 
        position: sticky; top: 0; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); z-index: 1000; 
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: -1.5px; }

    .search-container { 
        display: flex; align-items: center; background: rgba(255,255,255,0.05); 
        border: 1px solid var(--border); border-radius: 50px; padding: 5px 6px 5px 22px; 
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
    }
    .search-container input { background: transparent; border: none; color: #fff; font-size: 0.9rem; outline: none; width: 240px; font-weight: 300; }
    .search-container button { background: var(--accent); border: none; color: #000; font-weight: 700; font-size: 0.75rem; padding: 10px 24px; cursor: pointer; border-radius: 50px; text-transform: uppercase; }

    .time-strip { background: #000; border-bottom: 1px solid var(--border); padding: 10px 2.5rem; display: flex; gap: 2.5rem; overflow-x: auto; scrollbar-width: none; }
    .time-item { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .time-item span { color: var(--accent); margin-left: 8px; font-weight: 600; }

    .categories { display: flex; padding: 0 2.5rem; border-bottom: 1px solid var(--border); overflow-x: auto; gap: 1.5rem; scrollbar-width: none; background: var(--bg); }
    .cat-btn { background: none; border: none; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; padding: 1.5rem 0.5rem; cursor: pointer; text-transform: uppercase; border-bottom: 2px solid transparent; transition: 0.3s ease; letter-spacing: 1px; white-space: nowrap; }
    .cat-btn:hover, .cat-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .briefing-strip { background: #0a0a0a; border-bottom: 1px solid var(--border); padding: 0.9rem 2.5rem; font-size: 0.85rem; display: flex; align-items: center; }
    .briefing-label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.65rem; margin-right: 1.2rem; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 2px; }

    main { padding: 3rem 2.5rem; max-width: 1600px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem; }
    
    .card { 
        background: var(--card-bg); border: 1px solid var(--border); padding: 2.5rem; text-decoration: none; color: inherit; 
        transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); border-radius: 12px; display: flex; flex-direction: column; height: 100%; position: relative; overflow: hidden;
    }
    .card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(232, 197, 71, 0.4); transform: translateY(-12px); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.2rem; color: #fff; line-height: 1.2; }
    .card-summary { font-size: 0.92rem; color: #bbb; line-height: 1.75; margin-bottom: 1.2rem; font-weight: 300; }
    .card-intel { margin-bottom: 2rem; }
    .card-intel-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
    .card-intel-label.assessment { color: #e8c547; }
    .card-intel-label.precaution { color: #ff7b7b; }
    .importance-badge { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 7px; border-radius: 3px; margin-bottom: 1rem; }
    .importance-badge.high { background: rgba(255,45,45,0.15); color: #ff6b6b; border: 1px solid rgba(255,45,45,0.3); }
    .importance-badge.medium { background: rgba(232,197,71,0.15); color: #e8c547; border: 1px solid rgba(232,197,71,0.3); }
    .importance-badge.low { background: rgba(80,80,80,0.2); color: #888; border: 1px solid rgba(120,120,120,0.3); }
    .card-intel-text { font-size: 0.82rem; color: #999; line-height: 1.6; font-weight: 300; }
    .card-meta { margin-top: auto; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: #666; display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 1.5rem; align-items: center; }
    
    .share-btn { 
        background: none; border: none; color: var(--accent); 
        font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; 
        font-weight: 700; cursor: pointer; text-transform: uppercase; 
        letter-spacing: 1px; padding: 0; transition: opacity 0.3s;
    }
    .share-btn:hover { opacity: 0.7; }

    .pulse { height: 8px; width: 8px; background: #ff4d4d; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px #ff4d4d; animation: pulse-anim 2s infinite; }
    @keyframes pulse-anim { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* --- GLOBAL RISK MAP MODAL --- */
    .map-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px); z-index: 3000;
        padding: 2rem; flex-direction: column;
    }
    .map-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
    .map-container { flex-grow: 1; position: relative; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; min-height: 400px; }

    /* Leaflet map overrides */
    #riskMap { width: 100%; height: 100%; min-height: 500px; background: #111827; }
    .leaflet-container { background: #111827 !important; }
    .leaflet-tile { filter: brightness(0.55) saturate(0.5); }

    /* Risk legend */
    .map-legend {
        display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.critical { background: #ff2d2d; box-shadow: 0 0 8px #ff2d2d; }
    .legend-dot.high { background: #e8c547; box-shadow: 0 0 8px #e8c547; }
    .legend-dot.low { background: #2dff7a; box-shadow: 0 0 8px #2dff7a; }
    .legend-dot.none { background: #444; }

    /* Map loading state */
    .map-loading {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted);
        text-transform: uppercase; letter-spacing: 2px; z-index: 10;
    }

    /* Custom Leaflet tooltip overrides */
    .risk-tooltip {
        background: rgba(5, 5, 5, 0.95) !important;
        border: 1px solid var(--border) !important;
        border-radius: 6px !important;
        color: #fff !important;
        font-family: 'IBM Plex Mono', monospace !important;
        font-size: 0.7rem !important;
        padding: 10px 14px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.8) !important;
        white-space: nowrap;
    }
    .risk-tooltip::before { display: none !important; }
    .tooltip-country { font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; color: #fff; }
    .tooltip-level { text-transform: uppercase; letter-spacing: 1px; font-size: 0.65rem; }
    .tooltip-level.critical { color: #ff2d2d; }
    .tooltip-level.high { color: #e8c547; }
    .tooltip-level.low { color: #2dff7a; }
    .tooltip-level.none { color: #666; }

    /* Permanent country name labels on map */
    .map-country-label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        padding: 2px 6px;
        border-radius: 3px;
        pointer-events: none;
        transform: translate(-50%, -140%);
        display: inline-block;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    .map-label-critical { color: #ff6b6b; background: rgba(255,45,45,0.18); border: 1px solid rgba(255,45,45,0.4); }
    .map-label-high     { color: #f0d060; background: rgba(232,197,71,0.15); border: 1px solid rgba(232,197,71,0.4); }
    .map-label-low      { color: #5fffaa; background: rgba(45,255,122,0.12); border: 1px solid rgba(45,255,122,0.35); }
    .map-label-none     { color: #999;    background: rgba(80,80,80,0.15);   border: 1px solid rgba(120,120,120,0.3); }

    /* Live badge */
    .live-badge {
        color: var(--accent); font-family: 'IBM Plex Mono'; font-size: 0.7rem;
        border: 1px solid var(--accent); padding: 5px 15px; border-radius: 4px;
        animation: pulse-anim 2s infinite; display: flex; align-items: center; gap: 6px;
    }

    .share-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; }
    .share-menu { background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 340px; text-align: center; }
    .share-opt { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 15px; font-size: 0.65rem; font-family: 'IBM Plex Mono', monospace; text-decoration: none; cursor: pointer; display: block; margin-bottom: 10px; }
    .share-opt:hover { background: var(--accent); color: #000; }
  </style>
</head>
<body>

<header>
  <div class="logo">PULSE<span>.</span></div>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search keywords..." onkeypress="if(event.key==='Enter') searchNews()">
    <button onclick="searchNews()">Search</button>
  </div>
</header>

<div class="time-strip" id="timeStrip"></div>
<nav class="categories" id="catNav"></nav>

<div class="briefing-strip">
  <span class="briefing-label">Status</span>
  <span id="briefingText" style="color: #666;">Intelligence feed synchronized...</span>
</div>

<main><div class="grid" id="newsGrid"></div></main>

<!-- GLOBAL RISK MAP MODAL -->
<div class="map-overlay" id="mapOverlay">
    <div class="map-header">
        <div class="logo">PULSE<span>.</span> RISK MAP</div>
        <div class="map-legend">
            <div class="legend-item"><div class="legend-dot critical"></div> Critical</div>
            <div class="legend-item"><div class="legend-dot high"></div> High</div>
            <div class="legend-item"><div class="legend-dot low"></div> Low</div>
            <div class="legend-item"><div class="legend-dot none"></div> No Data</div>
        </div>
        <div class="live-badge">
            <span class="pulse"></span> LIVE INTELLIGENCE
        </div>
        <button class="cat-btn" onclick="closeMap()" style="color: #fff;">[ ESC ] CLOSE</button>
    </div>
    <div class="map-container" id="mapContainer">
        <div class="map-loading" id="mapLoading">LOADING GEOSPATIAL INTELLIGENCE...</div>
        <div id="riskMap"></div>
    </div>
</div>

<div class="share-overlay" id="shareOverlay">
    <div class="share-menu">
        <h4 style="font-family: 'Playfair Display'; color: var(--accent); margin-bottom: 2rem;">DISTRIBUTE</h4>
        <div class="share-options">
            <a id="shareX" class="share-opt" target="_blank">X.COM</a>
            <a id="shareFB" class="share-opt" target="_blank">FACEBOOK</a>
            <a id="shareLI" class="share-opt" target="_blank">LINKEDIN</a>
            <div onclick="copyToClipboard()" class="share-opt">COPY LINK</div>
        </div>
        <span onclick="closeShare()" style="color: var(--muted); cursor: pointer; font-size: 0.7rem; text-decoration: underline; margin-top: 1rem; display: block;">DISMISS</span>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
  const CATEGORIES = {{ categories | tojson }};
  let activeCategory = "Pakistan";
  let currentShareUrl = "";
  let riskMap = null;
  let mapInitialized = false;

  // ── RISK COLOR CONFIG ──
  const RISK_CONFIG = {
    critical: { color: '#ff2d2d', fillColor: '#ff2d2d', fillOpacity: 0.7,  radius: 350000, pulseColor: 'rgba(255,45,45,0.18)' },
    high:     { color: '#e8c547', fillColor: '#e8c547', fillOpacity: 0.65, radius: 280000, pulseColor: 'rgba(232,197,71,0.15)' },
    low:      { color: '#2dff7a', fillColor: '#2dff7a', fillOpacity: 0.55, radius: 200000, pulseColor: 'rgba(45,255,122,0.12)' },
    none:     { color: '#555555', fillColor: '#444444', fillOpacity: 0.4,  radius: 140000, pulseColor: 'rgba(80,80,80,0.1)'  }
  };

  function getRiskConfig(level) {
    return RISK_CONFIG[level] || RISK_CONFIG.none;
  }

  // ── WORLD CLOCK ──
  function updateWorldClock() {
    const zones = [
        { label: 'Islamabad', zone: 'Asia/Karachi' },
        { label: 'London', zone: 'Europe/London' },
        { label: 'New York', zone: 'America/New_York' },
        { label: 'Tokyo', zone: 'Asia/Tokyo' },
        { label: 'Dubai', zone: 'Asia/Dubai' }
    ];
    const now = new Date();
    document.getElementById('timeStrip').innerHTML = zones.map(z => {
        const timeStr = now.toLocaleTimeString('en-GB', { timeZone: z.zone, hour: '2-digit', minute: '2-digit', hour12: false });
        return `<div class="time-item">${z.label}<span>${timeStr}</span></div>`;
    }).join('');
  }

  async function updateBriefing() {
    try {
        const res = await fetch(`/api/summary?category=${activeCategory}`);
        const data = await res.json();
        if(data.success) document.getElementById('briefingText').innerText = data.summary;
    } catch(e) {}
  }

  // ── MAP ──
  function initMap() {
    if (mapInitialized) return;
    mapInitialized = true;

    riskMap = L.map('riskMap', {
      center: [20, 10],
      zoom: 2,
      zoomControl: true,
      attributionControl: false,
      minZoom: 1,
      maxZoom: 6
    });

    // Base tile layer — lighter dark style so countries are visible
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(riskMap);

    // Country label layer — full opacity so names are readable
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 20,
      opacity: 1.0
    }).addTo(riskMap);
  }

  async function loadRiskData() {
    document.getElementById('mapLoading').style.display = 'block';
    try {
      const res = await fetch('/api/risk');
      const data = await res.json();

      if (!data.success) return;

      // Clear old layers
      riskMap.eachLayer(layer => {
        if (layer._isRiskMarker) riskMap.removeLayer(layer);
      });

      const risk = data.risk;

      Object.entries(risk).forEach(([country, info]) => {
        const level = typeof info === 'object' ? info.level : info;
        const coords = typeof info === 'object' ? info.coords : null;
        if (!coords || coords[0] === 0) return;

        const cfg = getRiskConfig(level);

        // Outer pulse ring
        const pulse = L.circle(coords, {
          radius: cfg.radius * 2.2,
          color: 'transparent',
          fillColor: cfg.pulseColor,
          fillOpacity: 1,
          weight: 0
        }).addTo(riskMap);
        pulse._isRiskMarker = true;

        // Main circle marker
        const circle = L.circle(coords, {
          radius: cfg.radius,
          color: cfg.color,
          fillColor: cfg.fillColor,
          fillOpacity: cfg.fillOpacity,
          weight: 1.5,
          opacity: 0.9
        }).addTo(riskMap);
        circle._isRiskMarker = true;

        // Hover tooltip
        const levelLabel = level.charAt(0).toUpperCase() + level.slice(1);
        const tooltipHtml = `
          <div class="tooltip-country">${country}</div>
          <div class="tooltip-level ${level}">▲ ${levelLabel} Risk</div>
        `;

        circle.bindTooltip(tooltipHtml, {
          className: 'risk-tooltip',
          permanent: false,
          direction: 'top',
          offset: [0, -8]
        });

        circle.on('mouseover', function() { this.openTooltip(); });
        circle.on('mouseout', function() { this.closeTooltip(); });

        // Permanent floating country label
        const labelIcon = L.divIcon({
          className: '',
          html: `<div class="map-country-label map-label-${level}">${country}</div>`,
          iconAnchor: [0, 0]
        });
        const label = L.marker(coords, { icon: labelIcon, interactive: false });
        label.addTo(riskMap);
        label._isRiskMarker = true;
      });

      document.getElementById('mapLoading').style.display = 'none';
    } catch(e) {
      document.getElementById('mapLoading').innerText = 'FAILED TO LOAD RISK DATA';
    }
  }

  function openGlobalMap() {
    document.getElementById('mapOverlay').style.display = 'flex';
    // Small delay so the container is visible before Leaflet renders
    setTimeout(() => {
      initMap();
      riskMap.invalidateSize();
      loadRiskData();
    }, 100);
  }

  function closeMap() {
    document.getElementById('mapOverlay').style.display = 'none';
  }

  // Close map on ESC key
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMap(); });

  // ── SHARE ──
  function openShare(url, title) {
    currentShareUrl = url;
    document.getElementById('shareX').href = `https://x.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`;
    document.getElementById('shareOverlay').style.display = 'flex';
  }
  function closeShare() { document.getElementById('shareOverlay').style.display = 'none'; }
  function copyToClipboard() { navigator.clipboard.writeText(currentShareUrl); alert("LINK COPIED"); closeShare(); }

  // ── NEWS ──
  async function loadContent(query = "") {
    const grid = document.getElementById('newsGrid');
    grid.style.opacity = "0.3";
    try {
        const res = await fetch(`/api/news?category=${activeCategory}${query ? '&q='+query : ''}`);
        const data = await res.json();
        grid.innerHTML = data.articles.map(a => `
            <div class="card">
                <a href="${a.url}" target="_blank" style="text-decoration:none; color:inherit;">
                    <div class="card-title">${a.title}</div>
                    ${a.importance ? `<span class="importance-badge ${a.importance}">${a.importance} importance</span>` : ''}
                    <div class="card-summary">${a.summary || ''}</div>
                    <div class="card-intel">
                        <div class="card-intel-label assessment">▸ Assessment</div>
                        <div class="card-intel-text">${a.assessment || 'Situation under review.'}</div>
                    </div>
                    <div class="card-intel">
                        <div class="card-intel-label precaution">⚠ Advisory</div>
                        <div class="card-intel-text">${a.precaution || 'Monitor official sources.'}</div>
                    </div>
                </a>
                <div class="card-meta">
                    <span>${a.source}</span>
                    <div style="display:flex; gap:15px; align-items: center;">
                        <button class="share-btn" onclick="openShare('${a.url}', '${a.title.replace(/'/g, "\\'")}')">SHARE</button>
                        <span><span class="pulse"></span> LIVE</span>
                    </div>
                </div>
            </div>
        `).join('');
        grid.style.opacity = "1";
        updateBriefing();
    } catch (e) { console.error(e); }
  }

  function switchCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === cat));
    loadContent();
  }

  function searchNews() { loadContent(document.getElementById('searchInput').value); }

  // ── INIT ──
  function init() {
    updateWorldClock();
    setInterval(updateWorldClock, 60000);
    setInterval(updateBriefing, 300000);
    
    const nav = document.getElementById('catNav');
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = `cat-btn ${cat === activeCategory ? 'active' : ''}`;
      btn.innerText = cat;
      btn.onclick = () => switchCategory(cat);
      nav.appendChild(btn);
    });
    
    const mapBtn = document.createElement('button');
    mapBtn.className = 'cat-btn';
    mapBtn.style.color = 'var(--accent)';
    mapBtn.innerHTML = 'GLOBAL MAP';
    mapBtn.onclick = openGlobalMap;
    nav.appendChild(mapBtn);

    loadContent();
  }

  window.onload = init;
</script>
</body>
</html>
