<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PULSE — Real-Time News</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0a0a;
  --surface:#111;
  --border:#222;
  --accent:#e8c547;
  --text:#e8e8e8;
  --muted:#888;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans';
}

header {
  padding:20px;
  display:flex;
  justify-content:space-between;
  backdrop-filter: blur(12px);
  background:rgba(10,10,10,0.6);
  position:sticky;
  top:0;
}

.logo {
  font-family:'Playfair Display';
  color:var(--accent);
  font-size:28px;
}

.search-container {
  display:flex;
  gap:8px;
}

.search-container input {
  padding:6px;
  background:#111;
  border:1px solid #333;
  color:white;
}

.search-container button {
  background:var(--accent);
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

/* categories */
.categories {
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.cat-btn {
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
}

.cat-btn.active {
  color:var(--accent);
}

/* cards */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:rgba(20,20,20,0.6);
  padding:15px;
  border:1px solid var(--border);
  border-radius:12px;
  transition:0.3s;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform:scale(1.03);
  border-color:var(--accent);
}

.card-title {
  font-weight:bold;
  margin-bottom:10px;
}

.card-summary {
  color:var(--muted);
  font-size:14px;
}

</style>
</head>

<body>

<header>
  <div class="logo">PULSE</div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search news...">
    <button onclick="searchNews()">Search</button>
  </div>
</header>

<nav class="categories" id="catNav"></nav>

<div class="grid" id="newsGrid"></div>

<script>
const CATEGORIES = {{ categories | tojson }};
let activeCategory = "Pakistan";

function init() {
  const nav = document.getElementById("catNav");

  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;
    btn.className = "cat-btn";
    btn.onclick = () => {
      activeCategory = cat;
      loadNews();
    };
    nav.appendChild(btn);
  });

  loadNews();
}

async function loadNews(query="") {
  const res = await fetch(`/api/news?category=${activeCategory}&q=${query}`);
  const data = await res.json();

  const grid = document.getElementById("newsGrid");

  grid.innerHTML = data.articles.map(a => `
    <div class="card">
      <div class="card-title">${a.title}</div>
      <div class="card-summary">${a.summary}</div>
    </div>
  `).join("");
}

function searchNews() {
  const q = document.getElementById("searchInput").value;
  loadNews(q);
}

window.onload = init;
</script>

</body>
</html>
